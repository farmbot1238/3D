<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FARM BOT 3D</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --text: #ffffff;
      --primary: #4CAF50;
      --secondary: #2196F3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Segoe UI, Arial;
      background: url('rojet.jpg') no-repeat center center/cover;
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    
    /* العنوان الرئيسي */
    .main-title {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 30px 0;
      color: var(--text);
      text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
    }
    
    /* حاوية الأقسام */
    .sections-container {
      display: flex;
      flex-direction: column;
      gap: 50px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* كل قسم */
    .model-section {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    /* عنوان القسم */
    .section-title {
      font-size: 26px;
      margin: 0 0 20px 0;
      padding-bottom: 15px;
      border-bottom: 2px solid;
      color: var(--text);
      text-align: center;
    }
    
    .section-title.robot {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    .section-title.remote {
      border-color: var(--secondary);
      color: var(--secondary);
    }
    
    /* حاوية النموذج داخل القسم */
    .model-container {
      width: 100%;
      height: 500px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
    }
    
    model-viewer {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }
    
    /* التعديلات للشاشات الصغيرة */
    @media (max-width: 768px) {
      .main-title { font-size: 26px; }
      .section-title { font-size: 22px; }
      .model-container { height: 400px; }
      .sections-container { gap: 30px; }
      .model-section { padding: 15px; }
    }
    
    @media (max-width: 480px) {
      .model-container { height: 300px; }
      .main-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <h1 class="main-title">FARM BOT 3D</h1>
  
  <div class="sections-container">
    
    <!-- القسم الأول: ROBOT -->
    <section class="model-section">
      <h2 class="section-title robot">ROBOT FARM 80T</h2>
      <div class="model-container">
        <model-viewer
          src="3R.glb"
          alt="Farm Bot 3D Robot"
          auto-rotate
          camera-controls
          shadow-intensity="1"
          exposure="1">
        </model-viewer>
      </div>
    </section>
    
    <!-- القسم الثاني: REMOTE -->
    <section class="model-section">
      <h2 class="section-title remote">REMOTE FARM 80T</h2>
      <div class="model-container">
        <model-viewer
          src="RE.glb"
          alt="Farm Bot Remote"
          auto-rotate
          camera-controls
          shadow-intensity="1"
          exposure="1">
        </model-viewer>
      </div>
    </section>
    
  </div>
</body>
</html>
